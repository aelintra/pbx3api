server {
    listen 44300 ssl;
    listen [::]:44300 ssl;
    server_name _;

    # Active cert (custom -> Let's Encrypt -> snakeoil) written by apply-active-cert.sh
    include snippets/pbx3-ssl-active.conf;

    root /opt/pbx3api/public;
    index index.php;
    client_max_body_size 40M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "open_basedir=/opt/pbx3api:/opt/pbx3:/etc:/tmp:/usr/share/asterisk:/var/spool/asterisk";
    }
}

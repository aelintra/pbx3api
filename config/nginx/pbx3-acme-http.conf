# HTTP-01 for Let's Encrypt (webroot). default_server on port 80 only serves ACME challenges.
# API/SPA use HTTPS on 44300 (pbx3-api.conf). Webroot: /opt/pbx3/var/acme-challenge
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/pbx3/var/acme-challenge;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
